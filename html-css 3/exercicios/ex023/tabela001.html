<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            width: 400px;
            height: 400px;
            border-collapse: collapse;
               }
        td {
            border: 1px solid;
            padding: 8px;
            text-align: center;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <h1>Minha primera TABELA</h1>
         <!--
            HIERARQUIA DE TABELAS (simples)
            TABLE -> Tabelas
            TABLE ROW -> liha de tabela
            TABLE HEADER -> cabecalho de tabela
            TABLE DATA -> dado de tabela
        -->
    <table>
        <tr> <!--Primeira Linha-->
            <td>A1</td>
            <TD>B1</TD>
            <TD>C1 </TD>
        </tr>
        <tr>
            <td>Á2</td>
            <td>B2</td>
            <TD>C2</TD>
        </tr>
         <tr>
            <td>Á3</td>
            <td>B3</td>
            <TD>C3</TD>
        </tr>
         <tr>
            <td>Á4</td>
            <td>B4</td>
            <TD>C4</TD>
        </tr>
    </table>
</body>
</html>
