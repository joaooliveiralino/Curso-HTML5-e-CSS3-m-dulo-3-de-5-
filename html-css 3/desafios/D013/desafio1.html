<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Desafio de Tabelas - Parte 1</title>
    <style>
        table {
            width: 300px;
            border-collapse: collapse;
            text-align: center;
        }
        td {
            border: 1px solid black;
            padding: 10px;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td>1</td>
            <td>2</td>
            <td rowspan="2">3</td>
            <td>4</td>
        </tr>
        <tr>
            <td>5</td>
            <td>6</td>
            <td>9</td>
        </tr>
        <tr>
            <td>7</td>
            <td colspan="2">8</td>
            <td rowspan="3">10</td>
        </tr>
        <tr>
            <td rowspan="2">11</td>
            <td>12</td>
            <td>13</td>
        </tr>
        <tr>
            <td>14</td>
            <td>15</td>
        </tr>
    </table>
</body>
</html>
